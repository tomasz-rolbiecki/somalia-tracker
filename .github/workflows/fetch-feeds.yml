name: Fetch Somalia RSS Feeds

on:
  schedule:
    - cron: '0 */12 * * *'   # every 12 hours at minute 0
  workflow_dispatch:          # lets you run it manually from the UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch feeds
        run: python scripts/fetch_feeds.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update feeds $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
